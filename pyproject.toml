[project]
name = "maze-automate"
version = "0.1.0"
description = "Maze-style distractor stimulus generator for psycholinguistic experiments in English, German, and Arabic"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
dependencies = [
    "huggingface-hub>=0.20.0",
    "nltk>=3.8.0",
    "spacy>=3.5.0",
    "torch>=2.0.0",
    "transformers>=4.30.0",
    "wordfreq>=3.0.0",
]

[[tool.uv.index]]
url = "https://download.pytorch.org/whl/cu118"
